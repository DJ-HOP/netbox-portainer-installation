services:
  netbox:
    build:
      context: .
      dockerfile: Dockerfile-Plugins
    image: netbox:latest-plugins
    pull_policy: never
    environment:
      SKIP_SUPERUSER: "false"
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: MyPassword#123

  netbox-worker:
    image: netbox:latest-plugins
    pull_policy: never

  netbox-housekeeping:
    image: netbox:latest-plugins
    pull_policy: never
